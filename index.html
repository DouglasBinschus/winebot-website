<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wine Recommendation Chatbot</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="chat-container">
      <h1>🍷 Wine Recommendation Chatbot</h1>

      <div id="chat-box"></div>

      <div class="input-area">
        <input
          type="text"
          id="user-input"
          placeholder="Ask for a wine recommendation..."
        />
        <button id="send-btn">Send</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
